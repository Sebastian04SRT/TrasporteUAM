<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universidades — UAM Transporte</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --naranja:     #c95200;
      --naranja-mid: #e06010;
      --naranja-lt:  #fff4ed;
      --naranja-brd: #f5c9a8;
      --blanco:      #ffffff;
      --fondo:       #fdf8f4;
      --borde:       #e8ddd4;
      --texto:       #2a1a0e;
      --suave:       #7a6050;
      --verde:       #3d7a3d;
      --verde-lt:    #eaf4ea;
      --rojo:        #a83232;
      --rojo-lt:     #fbeaea;
      --sombra:      0 2px 8px rgba(100,40,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); font-size: 14px; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      background: var(--naranja);
      height: 54px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(100,40,0,0.18);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-logo {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 1.8; }
    .topbar h1 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: white; letter-spacing: 0.2px; }
    .topbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.25); }
    .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.6); font-family: 'Source Code Pro', monospace; }
    .topbar-right { font-family: 'Source Code Pro', monospace; font-size: 11px; color: rgba(255,255,255,0.5); }

    /* PAGE HEADER */
    .page-header {
      background: var(--blanco);
      border-bottom: 2px solid var(--naranja-brd);
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-header h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--naranja); }
    .page-header p { font-size: 13px; color: var(--suave); margin-top: 3px; }

    /* STATS */
    .stats-bar {
      background: var(--blanco);
      border-bottom: 1px solid var(--borde);
      padding: 12px 40px;
      display: flex; gap: 32px; align-items: center;
    }
    .stat { display: flex; align-items: baseline; gap: 8px; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--naranja); }
    .stat-label { font-size: 12px; color: var(--suave); }

    /* TOOLBAR */
    .toolbar {
      background: var(--blanco);
      border-bottom: 1px solid var(--borde);
      padding: 13px 40px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-box { position: relative; flex: 1; max-width: 380px; }
    .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--suave); fill: none; stroke-width: 2; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 11px 9px 34px; border: 1.5px solid var(--borde); border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; color: var(--texto); background: var(--fondo); outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--naranja); background: var(--blanco); }
    .search-input::placeholder { color: var(--suave); }
    .toolbar-right { margin-left: auto; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.1px; }
    .btn-primary { background: var(--naranja); color: white; box-shadow: 0 2px 8px rgba(100,40,0,0.2); }
    .btn-primary:hover { background: var(--naranja-mid); box-shadow: 0 4px 12px rgba(100,40,0,0.28); }
    .btn-secondary { background: var(--blanco); color: var(--texto); border: 1.5px solid var(--borde); }
    .btn-secondary:hover { border-color: var(--naranja); color: var(--naranja); background: var(--naranja-lt); }
    .btn-danger { background: var(--blanco); color: var(--rojo); border: 1.5px solid #e8b8b8; }
    .btn-danger:hover { background: var(--rojo-lt); border-color: var(--rojo); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* CONTENT */
    .content { padding: 26px 40px; }
    .table-meta { font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--suave); margin-bottom: 10px; }
    .table-meta span { color: var(--naranja); font-weight: 500; }

    /* TABLE */
    .table-wrap { background: var(--blanco); border: 1.5px solid var(--borde); border-radius: 8px; overflow: hidden; box-shadow: var(--sombra); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--naranja); }
    th { padding: 11px 16px; text-align: left; font-family: 'Source Code Pro', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.82); white-space: nowrap; }
    td { padding: 13px 16px; font-size: 13px; color: var(--texto); border-bottom: 1px solid var(--borde); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--naranja-lt); }
    .td-id { font-family: 'Source Code Pro', monospace; font-size: 12px; color: var(--naranja); font-weight: 500; }
    .td-nombre { font-weight: 600; }
    .td-muted { font-size: 12px; color: var(--suave); }
    .td-actions { display: flex; gap: 6px; }

    /* EMPTY */
    .empty { text-align: center; padding: 52px 20px; color: var(--suave); }
    .empty-icon { width: 48px; height: 48px; background: var(--naranja-lt); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; border: 1.5px solid var(--naranja-brd); }
    .empty-icon svg { width: 22px; height: 22px; stroke: var(--naranja); fill: none; stroke-width: 1.5; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--texto); margin-bottom: 5px; }
    .empty p { font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2.5px solid var(--borde); border-top-color: var(--naranja); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(40,15,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--blanco); border-radius: 10px; width: 100%; max-width: 450px; box-shadow: 0 16px 48px rgba(100,40,0,0.2); animation: fadeUp 0.2s ease; border: 1.5px solid var(--borde); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-head { background: var(--naranja); padding: 18px 22px; border-radius: 9px 9px 0 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-head h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: white; }
    .modal-close { width: 28px; height: 28px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.25); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .modal-close:hover { background: rgba(255,255,255,0.15); }
    .modal-close svg { width: 12px; height: 12px; stroke: white; fill: none; stroke-width: 2.5; }
    .modal-body { padding: 20px 22px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--suave); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--borde); border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; color: var(--texto); background: var(--fondo); outline: none; transition: border-color 0.15s; }
    .form-group input:focus { border-color: var(--naranja); background: var(--blanco); }
    .modal-foot { padding: 14px 22px; border-top: 1px solid var(--borde); display: flex; gap: 8px; justify-content: flex-end; background: var(--fondo); border-radius: 0 0 9px 9px; }

    /* TOAST */
    .toasts { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--blanco); border-left: 4px solid var(--verde); border-radius: 6px; padding: 11px 16px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(100,40,0,0.12); min-width: 230px; animation: toastIn 0.2s ease; color: var(--texto); }
    .toast.error { border-left-color: var(--rojo); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <h1>UAM Transporte</h1>
    <div class="topbar-sep"></div>
    <span class="topbar-sub">Sistema de Gestion</span>
  </div>
  <div class="topbar-right" id="reloj"></div>
</div>

<div class="page-header">
  <div>
    <h2>Universidades</h2>
    <p>Gestion de planteles UAM registrados en el sistema</p>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-total">—</div>
    <div class="stat-label">Universidades registradas</div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="buscador" placeholder="Buscar por nombre, direccion o telefono..." oninput="filtrar()">
  </div>
  <div class="toolbar-right">
    <button class="btn btn-primary" onclick="abrirModal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Agregar Universidad
    </button>
  </div>
</div>

<div class="content">
  <div class="table-meta" id="table-meta"></div>
  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Direccion</th>
        <th>Telefono</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody id="tbody">
      <tr><td colspan="5"><div class="empty"><div class="spinner"></div><p>Cargando datos...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Nueva Universidad</h3>
      <button class="modal-close" onclick="cerrarModal()"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>Nombre del plantel</label><input type="text" id="f-nombre" placeholder="Ej. UAM Cuajimalpa"></div>
      <div class="form-group"><label>Direccion</label><input type="text" id="f-direccion" placeholder="Calle, colonia, delegacion"></div>
      <div class="form-group"><label>Telefono</label><input type="text" id="f-telefono" placeholder="Ej. 5512345678"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
  const API = 'http://localhost:8080';
  let datos = [];

  function tick() {
    document.getElementById('reloj').textContent =
            new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  setInterval(tick, 1000); tick();

  function toast(msg, tipo) {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast' + (tipo === 'err' ? ' error' : '');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function abrirModal(data) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('edit-id').value = data ? data.idUniversidad : '';
    document.getElementById('f-nombre').value = data ? data.nombre : '';
    document.getElementById('f-direccion').value = data ? (data.direccion || '') : '';
    document.getElementById('f-telefono').value = data ? (data.telefono || '') : '';
    document.getElementById('modal-title').textContent = data ? 'Editar Universidad' : 'Nueva Universidad';
  }

  function cerrarModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  async function guardar() {
    const id = document.getElementById('edit-id').value;
    const nombre = document.getElementById('f-nombre').value.trim();
    if (!nombre) { toast('El nombre es obligatorio', 'err'); return; }
    const body = { nombre, direccion: document.getElementById('f-direccion').value.trim(), telefono: document.getElementById('f-telefono').value.trim() };
    try {
      if (id) {
        await fetch(API + '/universidades/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        toast('Universidad actualizada');
      } else {
        await fetch(API + '/universidades', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        toast('Universidad registrada');
      }
      cerrarModal(); cargar();
    } catch(e) { toast('Error al conectar con el servidor', 'err'); }
  }

  async function eliminar(id, nombre) {
    if (!confirm('Eliminar "' + nombre + '"?')) return;
    try {
      await fetch(API + '/universidades/' + id, { method: 'DELETE' });
      toast('Universidad eliminada'); cargar();
    } catch(e) { toast('Error al eliminar', 'err'); }
  }

  function filtrar() {
    const q = document.getElementById('buscador').value.toLowerCase();
    renderTabla(datos.filter(u =>
            (u.nombre||'').toLowerCase().includes(q) ||
            (u.direccion||'').toLowerCase().includes(q) ||
            (u.telefono||'').toLowerCase().includes(q)
    ));
  }

  function renderTabla(lista) {
    document.getElementById('stat-total').textContent = datos.length;
    document.getElementById('table-meta').innerHTML = 'Mostrando <span>' + lista.length + '</span> de <span>' + datos.length + '</span> registros';
    const tbody = document.getElementById('tbody');
    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l2-4h14l2 4"/></svg></div>
      <h3>Sin resultados</h3><p>No se encontraron coincidencias.</p>
    </div></td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map(u => `
    <tr>
      <td class="td-id">${String(u.idUniversidad).padStart(3,'0')}</td>
      <td class="td-nombre">${u.nombre}</td>
      <td class="td-muted">${u.direccion || '—'}</td>
      <td style="font-family:'Source Code Pro',monospace;font-size:12px">${u.telefono || '—'}</td>
      <td><div class="td-actions">
        <button class="btn btn-secondary btn-sm" onclick='abrirModal(${JSON.stringify(u)})'>Editar</button>
        <button class="btn btn-danger btn-sm" onclick='eliminar(${u.idUniversidad},"${u.nombre}")'>Eliminar</button>
      </div></td>
    </tr>`).join('');
  }

  async function cargar() {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5"><div class="empty"><div class="spinner"></div><p>Cargando...</p></div></td></tr>`;
    try {
      datos = await fetch(API + '/universidades').then(r => r.json());
      renderTabla(datos);
    } catch(e) {
      document.getElementById('tbody').innerHTML = `<tr><td colspan="5"><div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg></div>
      <h3>Sin conexion</h3><p>Verifica que el servidor este corriendo en el puerto 8080.</p>
    </div></td></tr>`;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) cerrarModal(); });
  cargar();
</script>
</body>
</html>
